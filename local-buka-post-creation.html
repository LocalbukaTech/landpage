<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Local Buka – Post Creation</title>

  <!--
    ═══════════════════════════════════════════════════════════════
    FIGMA MEASUREMENTS (exact values from design file)
    ───────────────────────────────────────────────────────────────
    Outer frame:      width: 974px  | height: 716.497px | gap: 24px
    Left column:      width: 435.574px | height: 249.095px | gap: 7.31px
    Action group:     width: 285.023px | height: 77.467px  | gap: 7.31px
    Post button:      width: 285.023px | height: 35.079px
    Discard button:   width: 285.023px | height: 35.079px  (77.467-35.079-7.31)
    Media frame:      width: 374.184px | height: 336.181px | border-radius: 8.77px
                      padding: 73.08px | gap: 7.31px | bg: #FFFFFF
    Details card gap: 974 - 2×16(card-pad) - 435.574 - 374.184 = 132.24px → space-between
    Share card:       width: 510px | border-radius: 17.54px
    Font (labels):    Nunito Sans 700  11.69px 140% lh
    Font (buttons):   Nunito Sans 600  11.69px 140% lh
    ═══════════════════════════════════════════════════════════════
  -->

  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,400;0,6..12,600;0,6..12,700&family=DM+Serif+Display&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Page shell ─────────────────────────────────────────────────────────
       Centered in viewport. 154px/233px are Figma canvas coords — not used.
    ──────────────────────────────────────────────────────────────────────── */
    body {
      font-family: 'Nunito Sans', sans-serif;
      background: #F5F5F0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
    }

    /* ── Outer page frame ────────────────────────────────────────────────────
       width: 974px | height: 716.4974px | gap: 24px
    ──────────────────────────────────────────────────────────────────────── */
    .page {
      width: 974px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Details card (top card) ─────────────────────────────────────────────
       Full width of .page | padding: 16px | border-radius: 18px
       gap between left-col and media-frame:
         974 - 2×16 - 435.574 - 374.184 = 132.24px → justify-content: space-between
    ──────────────────────────────────────────────────────────────────────── */
    .details-card {
      width: 100%;
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 18px;
      padding: 16px;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: flex-start;
    }

    /* ── Left column ─────────────────────────────────────────────────────────
       width: 435.5741882324219px | height: 249.0953826904297px | gap: 7.31px
    ──────────────────────────────────────────────────────────────────────── */
    .left-col {
      width: 435.5741882324219px;
      min-height: 249.0953826904297px;
      display: flex;
      flex-direction: column;
      gap: 7.31px;
      flex-shrink: 0;
    }

    /* ── "Details" label ─────────────────────────────────────────────────────
       font: Nunito Sans 700 Bold 11.69px 140% lh letter-spacing: 0%
    ──────────────────────────────────────────────────────────────────────── */
    .section-title {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 700;
      font-size: 11.69px;
      line-height: 140%;
      letter-spacing: 0em;
      color: #111827;
    }

    /* ── Description block ───────────────────────────────────────────────── */
    .desc-block {
      display: flex;
      flex-direction: column;
    }

    /* "Description" label — same font spec as section-title */
    .field-label {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 700;
      font-size: 11.69px;
      line-height: 140%;
      letter-spacing: 0em;
      color: #6B7280;
      margin-bottom: 4px;
    }

    .desc-textarea {
      width: 100%;
      /* Height derived from left-col: 249.095 - title(16.4) - gap×3(21.9)
         - meta-row(16.4) - action-col(77.47) ≈ 117px, use 110px per original */
      height: 110px;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      padding: 10px 12px;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 11.69px;
      line-height: 140%;
      color: #374151;
      background: #FAFAFA;
      resize: none;
      outline: none;
      transition: border-color 0.15s;
    }
    .desc-textarea::placeholder { color: #9CA3AF; }
    .desc-textarea:focus { border-color: #FBBE15; box-shadow: 0 0 0 3px rgba(251,190,21,0.15); }

    .char-count {
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 400;
      font-size: 10px;
      color: #9CA3AF;
      text-align: right;
      margin-top: 3px;
    }

    /* ── Meta row (Add Location | @Tag | Hashtags) ───────────────────────────
       font: Nunito Sans 700 Bold 11.69px 140% lh
       SVGs keep their exact native viewBox sizes — no forced override
    ──────────────────────────────────────────────────────────────────────── */
    .meta-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .meta-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 700;
      font-size: 11.69px;
      line-height: 140%;
      letter-spacing: 0em;
      color: #6B7280;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
      white-space: nowrap;
    }
    .meta-btn:hover { color: #111827; }
    /* SVGs use their own intrinsic sizes — the viewBox defines proportions */
    .meta-btn svg { flex-shrink: 0; display: block; }

    /* ── Action button group ─────────────────────────────────────────────────
       width: 285.02337646484375px | height: 77.4678955078125px | gap: 7.31px
    ──────────────────────────────────────────────────────────────────────── */
    .action-col {
      width: 285.02337646484375px;
      height: 77.4678955078125px;
      display: flex;
      flex-direction: column;
      gap: 7.31px;
      flex-shrink: 0;
    }

    /* ── Post button ─────────────────────────────────────────────────────────
       width: 285.02337646484375px | height: 35.07979965209961px
       font: Nunito Sans 600 SemiBold 11.69px 140% lh — centred
    ──────────────────────────────────────────────────────────────────────── */
    .btn-post {
      width: 285.02337646484375px;
      height: 35.07979965209961px;
      background: #FBBE15;
      border: none;
      border-radius: 10px;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 600;
      font-size: 11.69px;
      line-height: 140%;
      letter-spacing: 0em;
      text-align: center;
      color: #1a1000;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-post:hover { opacity: 0.85; }

    /* ── Discard button ──────────────────────────────────────────────────────
       height: 77.467 - 35.079 - 7.31 = 35.078px  ≈ 35.079px (symmetric)
       font: Nunito Sans 600 SemiBold 11.69px 140% lh — centred
    ──────────────────────────────────────────────────────────────────────── */
    .btn-discard {
      width: 285.02337646484375px;
      height: 35.07979965209961px;
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      font-family: 'Nunito Sans', sans-serif;
      font-weight: 600;
      font-size: 11.69px;
      line-height: 140%;
      letter-spacing: 0em;
      text-align: center;
      color: #6B7280;
      cursor: pointer;
      transition: background 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .btn-discard:hover { background: #F9FAFB; }

    /* ── Right media frame ───────────────────────────────────────────────────
       width: 374.1845397949219px | height: 336.1814270019531px
       border-radius: 8.77px | padding: 73.08px | gap: 7.31px | bg: #FFFFFF
       Inner video area = 374.184 - 2×73.08 - 2×1(border) = 226.02px wide
                         336.181 - 2×73.08 - 2×1(border) = 189.02px tall
    ──────────────────────────────────────────────────────────────────────── */
    .media-frame {
      width: 374.1845397949219px;
      height: 336.1814270019531px;
      flex-shrink: 0;
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 8.77px;
      padding: 73.08px;
      display: flex;
      flex-direction: column;
      gap: 7.31px;
      overflow: hidden;
    }

    /* ── Video thumbnail (fills inner area after padding) ──────────────────── */
    .video-thumb {
      width: 100%;
      flex: 1;
      border-radius: 8px;
      background: #111;
      overflow: hidden;
      position: relative;
    }

    .video-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 50%);
    }

    .video-controls {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 6px 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .play-btn {
      width: 20px;
      height: 20px;
      background: rgba(255,255,255,0.92);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      flex-shrink: 0;
    }

    /* CSS triangle play icon */
    .play-icon {
      width: 0;
      height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 7px solid #111827;
      margin-left: 2px;
    }

    .video-time {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 9px;
      font-weight: 600;
      color: #FFFFFF;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .progress-bar {
      flex: 1;
      height: 2.5px;
      background: rgba(255,255,255,0.3);
      border-radius: 2px;
      overflow: hidden;
    }

    .progress-fill {
      width: 18%;
      height: 100%;
      background: #FBBE15;
      border-radius: 2px;
    }

    .vol-btn,
    .expand-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      flex-shrink: 0;
    }

    .vol-btn svg,
    .expand-btn svg {
      width: 12px;
      height: 12px;
      stroke: #FFFFFF;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── Share card ──────────────────────────────────────────────────────────
       width: 510px | centred in page | border-radius: 17.54px
       padding: 20px 24px | gap: 14px
    ──────────────────────────────────────────────────────────────────────── */
    .share-card {
      width: 510px;
      margin: 0 auto;
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 17.54px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-align: center;
      flex-shrink: 0;
    }

    .share-title {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: #111827;
      line-height: 1.25;
    }

    .share-sub {
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: #6B7280;
      line-height: 1.55;
      max-width: 424px;
    }

    /* Finish button — full inner width of share card */
    .btn-finish {
      width: 100%;
      height: 48px;
      background: #FBBE15;
      border: none;
      border-radius: 12px;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #1a1000;
      cursor: pointer;
      transition: opacity 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      letter-spacing: 0em;
    }
    .btn-finish:hover { opacity: 0.85; }

    .btn-skip {
      background: none;
      border: none;
      font-family: 'Nunito Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #6B7280;
      cursor: pointer;
      transition: color 0.15s;
      padding: 0;
    }
    .btn-skip:hover { color: #374151; }

    /* ── Progress dots ───────────────────────────────────────────────────── */
    .dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      transition: background 0.2s;
    }
    .dot.on  { background: #FBBE15; }
    .dot.off { background: #E5E7EB; }

  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════
     OUTER PAGE FRAME  width: 974px | gap: 24px
     ═══════════════════════════════════════════════════════════ -->
<div class="page">

  <!-- ╔═════════════════════════════════════════════════════════╗
       ║  TOP CARD — Details (left) + Media frame (right)       ║
       ║  details-card: padding 16px, space-between             ║
       ╚═════════════════════════════════════════════════════════╝ -->
  <div class="details-card">

    <!-- ── LEFT COLUMN  435.574 × 249.095px | gap: 7.31px ────── -->
    <div class="left-col">

      <!-- Details label: Nunito Sans 700 11.69px -->
      <div class="section-title">Details</div>

      <!-- Description textarea block -->
      <div class="desc-block">
        <div class="field-label">Description</div>
        <textarea
          class="desc-textarea"
          placeholder="What's happening?"
          maxlength="4000"
          id="desc"
          oninput="document.getElementById('cc').textContent = this.value.length + '/4000'"
        ></textarea>
        <div class="char-count" id="cc">0/4000</div>
      </div>

      <!-- Meta action row: exact SVGs from Figma spec -->
      <div class="meta-row">

        <!-- Add Location — pin SVG 11×15 (native viewBox preserved) -->
        <button class="meta-btn" aria-label="Add Location">
          <svg width="11" height="15" viewBox="0 0 11 15" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5.1158 6.94288C4.63123 6.94288 4.16651 6.75038 3.82387 6.40774C3.48123 6.0651 3.28873 5.60037 3.28873 5.1158C3.28873 4.63123 3.48123 4.16651 3.82387 3.82387C4.16651 3.48123 4.63123 3.28873 5.1158 3.28873C5.60037 3.28873 6.0651 3.48123 6.40774 3.82387C6.75038 4.16651 6.94288 4.63123 6.94288 5.1158C6.94288 5.35574 6.89562 5.59332 6.8038 5.81499C6.71198 6.03667 6.5774 6.23808 6.40774 6.40774C6.23808 6.5774 6.03667 6.71198 5.81499 6.8038C5.59332 6.89562 5.35574 6.94288 5.1158 6.94288ZM5.1158 0C3.75901 0 2.45778 0.538985 1.49838 1.49838C0.538985 2.45778 0 3.75901 0 5.1158C0 8.95266 5.1158 14.6166 5.1158 14.6166C5.1158 14.6166 10.2316 8.95266 10.2316 5.1158C10.2316 3.75901 9.69262 2.45778 8.73322 1.49838C7.77382 0.538985 6.4726 0 5.1158 0Z" fill="#6B7280"/>
          </svg>
          Add Location
        </button>

        <!-- Add @Tag — tag SVG 15×15 (native viewBox preserved) -->
        <button class="meta-btn" aria-label="Add @Tag">
          <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M6.12854 0.00901961C6.42362 -0.0178284 6.72107 0.0154109 7.00294 0.10673C7.28481 0.198049 7.54525 0.345553 7.76852 0.540332L7.87815 0.642648L13.5947 6.35993C13.9881 6.75342 14.2172 7.28178 14.2355 7.83791C14.2538 8.39404 14.06 8.93633 13.6934 9.35486L13.5947 9.4601L9.46039 13.5944C9.0669 13.9878 8.53854 14.2169 7.98241 14.2352C7.42628 14.2535 6.88399 14.0597 6.46546 13.6931L6.36022 13.5944L0.642209 7.87713C0.432808 7.66774 0.267996 7.4181 0.157713 7.14327C0.0474308 6.86845 -0.00603528 6.57413 0.000540696 6.27807L0.00857993 6.12825L0.353531 2.3389C0.397818 1.85055 0.604536 1.39114 0.940646 1.0341C1.27676 0.677056 1.72285 0.442993 2.20764 0.369318L2.33846 0.353971L6.12854 0.00901961ZM4.29197 4.29241C4.15621 4.42816 4.04853 4.58933 3.97506 4.7667C3.90159 4.94407 3.86377 5.13418 3.86377 5.32617C3.86377 5.51815 3.90159 5.70826 3.97506 5.88563C4.04853 6.06301 4.15621 6.22417 4.29197 6.35993C4.42772 6.49568 4.58889 6.60337 4.76626 6.67684C4.94363 6.75031 5.13374 6.78812 5.32573 6.78812C5.51771 6.78812 5.70782 6.75031 5.88519 6.67684C6.06257 6.60337 6.22373 6.49568 6.35949 6.35993C6.63365 6.08576 6.78768 5.7139 6.78768 5.32617C6.78768 4.93843 6.63365 4.56658 6.35949 4.29241C6.08532 4.01824 5.71346 3.86421 5.32573 3.86421C4.93799 3.86421 4.56614 4.01824 4.29197 4.29241Z" fill="#6B7280"/>
          </svg>
          Add @Tag
        </button>

        <!-- Hashtags — grid SVG 12×12 (native viewBox preserved) -->
        <button class="meta-btn" aria-label="Hashtags">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M11.6933 3.65415C11.6933 3.25219 11.3644 2.92332 10.9624 2.92332H8.76995V0.730829C8.76995 0.328873 8.44108 0 8.03912 0C7.63717 0 7.30829 0.328873 7.30829 0.730829V2.92332H4.38497V0.730829C4.38497 0.328873 4.0561 0 3.65415 0C3.25219 0 2.92332 0.328873 2.92332 0.730829V2.92332H0.730829C0.328873 2.92332 0 3.25219 0 3.65415C0 4.0561 0.328873 4.38497 0.730829 4.38497H2.92332V7.30829H0.730829C0.328873 7.30829 0 7.63717 0 8.03912C0 8.44108 0.328873 8.76995 0.730829 8.76995H2.92332V10.9624C2.92332 11.3644 3.25219 11.6933 3.65415 11.6933C4.0561 11.6933 4.38497 11.3644 4.38497 10.9624V8.76995H7.30829V10.9624C7.30829 11.3644 7.63717 11.6933 8.03912 11.6933C8.44108 11.6933 8.76995 11.3644 8.76995 10.9624V8.76995H10.9624C11.3644 8.76995 11.6933 8.44108 11.6933 8.03912C11.6933 7.63717 11.3644 7.30829 10.9624 7.30829H8.76995V4.38497H10.9624C11.3644 4.38497 11.6933 4.0561 11.6933 3.65415ZM7.30829 7.30829H4.38497V4.38497H7.30829V7.30829Z" fill="#6B7280"/>
          </svg>
          Hashtags
        </button>
      </div>

      <!-- Action col: 285.023 × 77.467px | gap: 7.31px -->
      <div class="action-col">
        <!-- Post: 285.023 × 35.079px | Nunito Sans 600 11.69px -->
        <button class="btn-post">Post</button>
        <!-- Discard: 285.023 × 35.079px | Nunito Sans 600 11.69px -->
        <button class="btn-discard">Discard</button>
      </div>

    </div><!-- /left-col -->

    <!-- ── RIGHT MEDIA FRAME  374.184 × 336.181px ─────────────────
         border-radius: 8.77px | padding: 73.08px | bg: #FFFFFF
         Inner content area: 374.184-2×73.08-2 = 226.02px wide
                             336.181-2×73.08-2 = 189.02px tall
    ──────────────────────────────────────────────────────────── -->
    <div class="media-frame">
      <div class="video-thumb">
        <img
          src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=600&q=80"
          alt="Food post preview"
          loading="eager"
        />
        <div class="video-overlay"></div>
        <div class="video-controls">
          <button class="play-btn" aria-label="Play">
            <div class="play-icon"></div>
          </button>
          <span class="video-time">00:03</span>
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
          <button class="vol-btn" aria-label="Volume">
            <svg viewBox="0 0 24 24">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>
          <button class="expand-btn" aria-label="Expand">
            <svg viewBox="0 0 24 24">
              <polyline points="15 3 21 3 21 9"/>
              <polyline points="9 21 3 21 3 15"/>
              <line x1="21" y1="3" x2="14" y2="10"/>
              <line x1="3" y1="21" x2="10" y2="14"/>
            </svg>
          </button>
        </div>
      </div>
    </div><!-- /media-frame -->

  </div><!-- /details-card -->


  <!-- ╔═════════════════════════════════════════════════════════╗
       ║  SHARE CARD  width: 510px | centred | radius: 17.54px  ║
       ╚═════════════════════════════════════════════════════════╝ -->
  <div class="share-card">
    <div class="share-title">Share your food story!</div>
    <div class="share-sub">Post your meal, tag the spot, and help others discover it.</div>
    <button class="btn-finish">Finish</button>
    <button class="btn-skip">Skip</button>
    <div class="dots">
      <div class="dot on"></div>
      <div class="dot off"></div>
      <div class="dot off"></div>
    </div>
  </div>

</div><!-- /page -->

</body>
</html>
